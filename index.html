<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>סדר הדורות — Jewish Generations Timeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&family=Heebo:wght@300;400;600&family=Secular+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Floating Year HUD -->
  <div id="year-hud" class="year-hud" aria-live="polite">
    <span id="hud-he-year" class="hud-year"></span>
    <span class="hud-sep">/</span>
    <span id="hud-ce-year" class="hud-year hud-year-ce"></span>
  </div>

  <!-- Auth Button -->
  <div id="auth-area" class="auth-area">
    <button id="auth-btn" class="auth-btn" aria-label="התחברות">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span id="auth-label">התחבר</span>
    </button>
    <div id="auth-menu" class="auth-menu">
      <div id="auth-user-info" class="auth-user-info"></div>
      <a id="admin-link" href="admin.html" class="auth-menu-item admin-link" style="display:none;">ניהול</a>
      <button id="signout-btn" class="auth-menu-item signout-btn">התנתק</button>
    </div>
  </div>

  <!-- Search Button -->
  <button id="search-toggle" class="search-toggle" aria-label="חיפוש">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
  </button>

  <!-- Search Overlay -->
  <div id="search-overlay" class="search-overlay">
    <div class="search-inner">
      <input id="search-input" type="text" class="search-input" placeholder="חפש לפי שם..." autocomplete="off">
      <button id="search-close" class="search-close" aria-label="סגור">&times;</button>
      <div id="search-results" class="search-results"></div>
    </div>
  </div>

  <!-- Era Navigation Dots -->
  <nav id="era-nav" class="era-nav" aria-label="ניווט תקופות">
    <!-- Dots generated by JS -->
  </nav>

  <!-- Main Layout -->
  <div class="app-layout">

    <!-- Timeline Sidebar -->
    <aside id="timeline-sidebar" class="timeline-sidebar">
      <div class="timeline-header">
        <span class="tl-label">שנה עברית</span>
        <span class="tl-label">לספירה</span>
      </div>
      <div id="timeline-track" class="timeline-track">
        <div id="timeline-indicator" class="timeline-indicator"></div>
        <!-- Year marks generated by JS -->
      </div>
    </aside>

    <!-- Tree Content -->
    <main id="tree-content" class="tree-content">
      <header class="app-header">
        <h1 class="app-title">סדר הדורות</h1>
        <p class="app-subtitle">The Order of Generations</p>
      </header>

      <svg id="tree-svg" class="tree-svg" aria-hidden="true">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <!-- Trunk and branches rendered by JS -->
      </svg>

      <div id="eras-container" class="eras-container">
        <!-- Era sections rendered by JS -->
      </div>
    </main>
  </div>

  <!-- Detail Panel -->
  <div id="detail-backdrop" class="detail-backdrop"></div>
  <aside id="detail-panel" class="detail-panel">
    <button id="detail-close" class="detail-close" aria-label="סגור">&times;</button>
    <div class="detail-avatar-wrap">
      <div id="detail-avatar" class="detail-avatar"></div>
    </div>
    <h2 id="detail-name-he" class="detail-name-he"></h2>
    <p id="detail-name-en" class="detail-name-en"></p>
    <div class="detail-years">
      <span id="detail-years-he" class="detail-years-he"></span>
      <span class="detail-years-sep">—</span>
      <span id="detail-years-ce" class="detail-years-ce"></span>
    </div>
    <div id="detail-badge" class="detail-badge"></div>

    <!-- Edit Toggle Button (visible when logged in) -->
    <button id="edit-toggle-btn" class="edit-toggle-btn" style="display:none;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span>ערוך מידע</span>
    </button>

    <!-- READ-ONLY VIEW -->
    <div id="detail-view" class="detail-view">
      <div class="detail-tabs">
        <button class="detail-tab active" data-tab="summary">סיכום</button>
        <button class="detail-tab" data-tab="midrash">מדרש</button>
        <button class="detail-tab" data-tab="sources">מקורות</button>
        <button class="detail-tab" data-tab="notes">הערות</button>
      </div>
      <div class="detail-tab-content">
        <div id="tab-summary" class="tab-pane active">
          <p class="tab-placeholder">תוכן הסיכום יתמלא בהמשך...</p>
        </div>
        <div id="tab-midrash" class="tab-pane">
          <p class="tab-placeholder">תוכן המדרש יתמלא בהמשך...</p>
        </div>
        <div id="tab-sources" class="tab-pane">
          <p class="tab-placeholder">מקורות יתמלאו בהמשך...</p>
        </div>
        <div id="tab-notes" class="tab-pane">
          <div id="notes-list"></div>
          <p id="notes-placeholder" class="tab-placeholder">הערות יתמלאו בהמשך...</p>
        </div>
      </div>
    </div>

    <!-- EDIT MODE (hidden by default) -->
    <div id="contribute-section" class="contribute-section" style="display:none;">
      <div class="contribute-header">
        <h3 class="contribute-title">עריכת מידע</h3>
        <button id="edit-cancel-btn" class="edit-cancel-btn">ביטול</button>
      </div>

      <div id="contribute-form" class="contribute-form">
        <div class="contribute-tabs">
          <button class="contrib-tab active" data-ctype="edit_person">עריכה</button>
          <button class="contrib-tab" data-ctype="add_source">מקור</button>
          <button class="contrib-tab" data-ctype="add_note">הערה</button>
        </div>

        <div id="contrib-edit" class="contrib-pane active">
          <label class="contrib-label">סיכום</label>
          <textarea id="contrib-summary" class="contrib-input" rows="3" placeholder="הוסף או ערוך סיכום..."></textarea>
          <label class="contrib-label">מדרש</label>
          <textarea id="contrib-midrash" class="contrib-input" rows="3" placeholder="הוסף או ערוך מדרש..."></textarea>
          <label class="contrib-label">תואר</label>
          <input id="contrib-title" class="contrib-input" type="text" placeholder="לדוגמה: צדיק, נביא...">
        </div>

        <div id="contrib-source" class="contrib-pane">
          <label class="contrib-label">מקור חדש</label>
          <textarea id="contrib-source-text" class="contrib-input" rows="4" placeholder="הוסף מקור או הפניה..."></textarea>
        </div>

        <div id="contrib-note" class="contrib-pane">
          <label class="contrib-label">הערה</label>
          <textarea id="contrib-note-text" class="contrib-input" rows="4" placeholder="הוסף הערה, תובנה..."></textarea>
        </div>

        <button id="contrib-submit" class="contrib-submit-btn">שלח לאישור</button>
        <div id="contrib-status" class="contrib-status"></div>
      </div>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="data.js"></script>
  <script src="auth.js"></script>
  <script src="submissions.js"></script>
  <script src="app.js"></script>
</body>
</html>
