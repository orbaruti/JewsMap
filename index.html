<!DOCTYPE html>
<html lang="he" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>סדר הדורות — Jewish Generations Timeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&family=Heebo:wght@300;400;600&family=Secular+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Top Toolbar (all icons in one flex row — no overlap) -->
  <div class="top-toolbar" data-testid="top-toolbar">
    <div class="toolbar-start">
      <button id="search-toggle" class="icon-btn search-toggle" type="button" data-testid="search-toggle" aria-label="חיפוש">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      </button>
      <button id="theme-toggle" class="icon-btn theme-toggle" aria-label="החלף ערכת נושא">
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button id="add-person-toggle" class="icon-btn add-person-toggle" style="display:none;" aria-label="הוסף אישיות">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>

    <div id="year-hud" class="year-hud" data-testid="year-hud" aria-live="polite">
      <span id="hud-he-year" class="hud-year"></span>
      <span class="hud-sep">/</span>
      <span id="hud-ce-year" class="hud-year hud-year-ce"></span>
    </div>

    <div class="toolbar-end">
      <div id="auth-area" class="auth-area">
        <button id="auth-btn" class="auth-btn" aria-label="התחברות">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span id="auth-label">התחבר</span>
        </button>
        <div id="auth-menu" class="auth-menu">
          <div id="auth-user-info" class="auth-user-info"></div>
          <a id="admin-link" href="admin.html" class="auth-menu-item admin-link" style="display:none;">ניהול</a>
          <button id="signout-btn" class="auth-menu-item signout-btn">התנתק</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Search Overlay -->
  <div id="search-overlay" class="search-overlay" data-testid="search-overlay">
    <div class="search-inner">
      <input id="search-input" type="text" class="search-input" data-testid="search-input" placeholder="חפש לפי שם..." autocomplete="off">
      <button id="search-close" class="search-close" aria-label="סגור">&times;</button>
      <div id="search-results" class="search-results" data-testid="search-results"></div>
    </div>
  </div>

  <!-- Era Navigation Dots -->
  <nav id="era-nav" class="era-nav" data-testid="era-nav" aria-label="ניווט תקופות">
    <!-- Dots generated by JS -->
  </nav>

  <!-- Main Layout -->
  <div class="app-layout">

    <!-- Timeline Sidebar -->
    <aside id="timeline-sidebar" class="timeline-sidebar">
      <div class="timeline-header">
        <span class="tl-label">שנה עברית</span>
        <span class="tl-label">לספירה</span>
      </div>
      <div id="timeline-track" class="timeline-track">
        <div id="timeline-indicator" class="timeline-indicator"></div>
        <!-- Year marks generated by JS -->
      </div>
    </aside>

    <!-- Tree Content -->
    <main id="tree-content" class="tree-content" data-testid="tree-content">
      <header class="app-header">
        <h1 class="app-title">סדר הדורות</h1>
        <p class="app-subtitle">The Order of Generations</p>
      </header>

      <svg id="tree-svg" class="tree-svg" aria-hidden="true">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <!-- Trunk and branches rendered by JS -->
      </svg>

      <div id="eras-container" class="eras-container">
        <!-- Era sections rendered by JS -->
      </div>
    </main>
  </div>

  <!-- Detail Panel -->
  <div id="detail-backdrop" class="detail-backdrop"></div>
  <aside id="detail-panel" class="detail-panel" data-testid="detail-panel">
    <button id="detail-close" class="detail-close" aria-label="סגור">&times;</button>
    <div class="detail-avatar-wrap">
      <div id="detail-avatar" class="detail-avatar"></div>
    </div>
    <h2 id="detail-name-he" class="detail-name-he" data-testid="detail-name-he"></h2>
    <p id="detail-name-en" class="detail-name-en" data-testid="detail-name-en"></p>
    <div class="detail-years">
      <span id="detail-years-he" class="detail-years-he"></span>
      <span class="detail-years-sep">—</span>
      <span id="detail-years-ce" class="detail-years-ce"></span>
    </div>
    <div id="detail-badge" class="detail-badge"></div>

    <!-- Family Connections -->
    <div id="family-connections" class="family-connections"></div>

    <!-- Edit Toggle Button (visible when logged in) -->
    <button id="edit-toggle-btn" class="edit-toggle-btn" style="display:none;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span>ערוך מידע</span>
    </button>

    <!-- READ-ONLY VIEW -->
    <div id="detail-view" class="detail-view">
      <div class="detail-tabs">
        <button class="detail-tab active" data-tab="summary">סיכום</button>
        <button class="detail-tab" data-tab="journey">מסע חיים</button>
        <button class="detail-tab" data-tab="midrash">מדרש</button>
        <button class="detail-tab" data-tab="sources">מקורות</button>
        <button class="detail-tab" data-tab="notes">הערות</button>
        <button class="detail-tab" data-tab="family">עץ משפחה</button>
      </div>
      <div class="detail-tab-content">
        <div id="tab-summary" class="tab-pane active">
          <p class="tab-placeholder" data-testid="detail-summary">תוכן הסיכום יתמלא בהמשך...</p>
        </div>
        <div id="tab-journey" class="tab-pane">
          <p class="tab-placeholder">מסע חיים — יתמלא כשנאסוף אירועים. (דוגמה: אברהם אבינו.)</p>
        </div>
        <div id="tab-midrash" class="tab-pane">
          <p class="tab-placeholder">תוכן המדרש יתמלא בהמשך...</p>
        </div>
        <div id="tab-sources" class="tab-pane">
          <p class="tab-placeholder">מקורות יתמלאו בהמשך...</p>
        </div>
        <div id="tab-notes" class="tab-pane">
          <div id="notes-list"></div>
          <p id="notes-placeholder" class="tab-placeholder">הערות יתמלאו בהמשך...</p>
        </div>
        <div id="tab-family" class="tab-pane">
          <div id="family-tree-container"></div>
        </div>
      </div>
    </div>

    <!-- EDIT MODE (hidden by default) -->
    <div id="contribute-section" class="contribute-section" style="display:none;">
      <div class="contribute-header">
        <h3 class="contribute-title">עריכת מידע</h3>
        <button id="edit-cancel-btn" class="edit-cancel-btn">ביטול</button>
      </div>

      <div id="contribute-form" class="contribute-form">
        <div class="contribute-tabs">
          <button class="contrib-tab active" data-ctype="edit_person">עריכה</button>
          <button class="contrib-tab" data-ctype="add_source">מקור</button>
          <button class="contrib-tab" data-ctype="add_note">הערה</button>
        </div>

        <div id="contrib-edit" class="contrib-pane active">
          <label class="contrib-label">סיכום</label>
          <textarea id="contrib-summary" class="contrib-input" rows="3" placeholder="הוסף או ערוך סיכום..."></textarea>
          <label class="contrib-label">מדרש</label>
          <textarea id="contrib-midrash" class="contrib-input" rows="3" placeholder="הוסף או ערוך מדרש..."></textarea>
          <label class="contrib-label">תואר</label>
          <input id="contrib-title" class="contrib-input" type="text" placeholder="לדוגמה: צדיק, נביא...">
        </div>

        <div id="contrib-source" class="contrib-pane">
          <label class="contrib-label">מקור חדש</label>
          <textarea id="contrib-source-text" class="contrib-input" rows="4" placeholder="הוסף מקור או הפניה..."></textarea>
        </div>

        <div id="contrib-note" class="contrib-pane">
          <label class="contrib-label">הערה</label>
          <textarea id="contrib-note-text" class="contrib-input" rows="4" placeholder="הוסף הערה, תובנה..."></textarea>
        </div>

        <button id="contrib-submit" class="contrib-submit-btn">שלח לאישור</button>
        <div id="contrib-status" class="contrib-status"></div>
      </div>
    </div>
  </aside>

  <!-- Floating Family Tree Window -->
  <div id="ftree-window" class="ftree-window">
    <div class="ftree-window-header" id="ftree-window-header">
      <button id="ftree-window-back" class="ftree-window-back" aria-label="חזור" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span id="ftree-window-title" class="ftree-window-title"></span>
      <button id="ftree-window-close" class="ftree-window-close" aria-label="סגור">&times;</button>
    </div>
    <div id="ftree-window-body" class="ftree-window-body"></div>
  </div>

  <!-- Add Person Modal -->
  <div id="add-person-backdrop" class="add-person-backdrop"></div>
  <div id="add-person-modal" class="add-person-modal">
    <div class="add-person-modal-header">
      <h2 class="add-person-modal-title">הוסף אישיות</h2>
      <button id="add-person-close" class="add-person-close" aria-label="סגור">&times;</button>
    </div>

    <div class="add-person-modal-body">
      <div class="add-person-section">
        <h3 class="add-person-section-title">שדות חובה</h3>
        <label class="add-person-label" for="ap-name-he">שם בעברית <span class="required-mark">*</span></label>
        <input id="ap-name-he" class="add-person-input" type="text" placeholder="לדוגמה: משה רבנו" required>

        <label class="add-person-label" for="ap-name-en">שם באנגלית <span class="required-mark">*</span></label>
        <input id="ap-name-en" class="add-person-input" type="text" placeholder="e.g. Moshe Rabenu" dir="ltr" required>

        <label class="add-person-label" for="ap-era">תקופה <span class="required-mark">*</span></label>
        <select id="ap-era" class="add-person-input add-person-select" required>
          <option value="">בחר תקופה...</option>
        </select>
      </div>

      <div class="add-person-section">
        <h3 class="add-person-section-title">שדות אופציונליים</h3>
        <div class="add-person-row">
          <div class="add-person-field">
            <label class="add-person-label" for="ap-birth-year">שנת לידה (עברית)</label>
            <input id="ap-birth-year" class="add-person-input" type="number" placeholder="לדוגמה: 2368">
          </div>
          <div class="add-person-field">
            <label class="add-person-label" for="ap-death-year">שנת פטירה (עברית)</label>
            <input id="ap-death-year" class="add-person-input" type="number" placeholder="לדוגמה: 2488">
          </div>
        </div>

        <label class="add-person-label" for="ap-title">תואר</label>
        <input id="ap-title" class="add-person-input" type="text" placeholder="לדוגמה: צדיק, נביא, מלך...">

        <label class="add-person-label" for="ap-father-id">מזהה אב (ID)</label>
        <input id="ap-father-id" class="add-person-input" type="text" placeholder="לדוגמה: avraham-avinu" dir="ltr">

        <label class="add-person-label" for="ap-mother-id">מזהה אם (ID)</label>
        <input id="ap-mother-id" class="add-person-input" type="text" placeholder="לדוגמה: sarah-imenu" dir="ltr">

        <label class="add-person-label" for="ap-spouse-ids">מזהי בני/בנות זוג (מופרדים בפסיקים)</label>
        <input id="ap-spouse-ids" class="add-person-input" type="text" placeholder="לדוגמה: sarah-imenu, hagar" dir="ltr">

        <label class="add-person-label" for="ap-summary">סיכום</label>
        <textarea id="ap-summary" class="add-person-input" rows="3" placeholder="סיכום קצר על האישיות..."></textarea>

        <label class="add-person-label" for="ap-midrash">מדרש</label>
        <textarea id="ap-midrash" class="add-person-input" rows="3" placeholder="מדרש או סיפור..."></textarea>

        <label class="add-person-label" for="ap-sources">מקורות</label>
        <textarea id="ap-sources" class="add-person-input" rows="3" placeholder="מקורות והפניות..."></textarea>
      </div>

      <button id="ap-submit" class="add-person-submit-btn" disabled>שלח לאישור</button>
      <div id="ap-status" class="add-person-status"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="data.js"></script>
  <script src="auth.js"></script>
  <script src="lib/merge-approved.js"></script>
  <script src="submissions.js"></script>
  <script src="app.js"></script>
</body>
</html>
